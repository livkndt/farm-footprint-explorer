services:
  db:
    build: ./db
    environment:
      POSTGRES_USER: farmuser
      POSTGRES_PASSWORD: farmpass
      POSTGRES_DB: farmfootprint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://farmuser:farmpass@db:5432/farmfootprint
      ENVIRONMENT: development
      UV_LINK_MODE: copy
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/.venv

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
